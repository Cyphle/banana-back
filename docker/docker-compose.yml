version: '3.8'
services:
  postgres:
    image: postgres:16.9-bookworm
    container_name: postgres_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastifyexample
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fastifyexample

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    command:
      - start-dev # for testing purposes
      - --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./keycloak/realms/fastifyexample.json:/opt/keycloak/data/import/fastifyexample.json
    ports:
      - "8182:8080"
    networks:
      - fastifyexample

volumes:
  postgres_data:
    driver: local

networks:
  fastifyexample:
    driver: bridge